name: Update Postman Collections

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:       # Allow manual trigger
    inputs:
      test:
        description: 'Run in test mode (uses local fixtures, no PR created)'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout collections repo
        uses: actions/checkout@v4
        with:
          path: collections-repo

      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: moloco-mcm/mcm-postman-sync-tool
          token: ${{ secrets.TOOLS_REPO_TOKEN }}
          path: tools-repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update Postman collections from latest API specs
        env:
          README_API_KEY: ${{ secrets.README_API_KEY }}
          COLLECTIONS_REPO: ${{ github.workspace }}/collections-repo
        run: python tools-repo/update_collections.py ${{ inputs.test && '--test' || '' }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: collections-repo
          commit-message: "chore: auto-update Postman collections from latest API specs"
          branch: ${{ inputs.test && 'test/update-collections' || 'auto/update-collections' }}
          delete-branch: true
          title: ${{ inputs.test && '[TEST] chore: auto-update Postman collections' || 'chore: auto-update Postman collections' }}
          body: |
            ## ${{ inputs.test && '⚠️ TEST RUN — do not merge' || 'Auto-update' }}

            ${{ inputs.test && 'This PR was created in **test mode** using local fixtures. It is for verification only.' || 'Weekly automated update of Postman collection request bodies from the latest OpenAPI specs on README.com.' }}

            > Triggered by [update-collections workflow](../actions/workflows/update-collections.yml)

      - name: Report result
        run: |
          if [ "${{ steps.create-pr.outputs.pull-request-operation }}" = "none" ] || [ -z "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo "✅ Collections are already up to date. No changes detected."
          else
            echo "✅ PR created: ${{ steps.create-pr.outputs.pull-request-url }}"
          fi

