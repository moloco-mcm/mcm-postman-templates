name: Update Postman Collections

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:       # Allow manual trigger
    inputs:
      test:
        description: 'Run in test mode (uses local fixtures)'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout collections repo
        uses: actions/checkout@v4
        with:
          path: collections-repo

      - name: Checkout tools repo
        uses: actions/checkout@v4
        with:
          repository: moloco-mcm/mcm-postman-sync-tool
          token: ${{ secrets.TOOLS_REPO_TOKEN }}
          path: tools-repo

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Update Postman collections from latest API specs
        id: update
        env:
          README_API_KEY: ${{ secrets.README_API_KEY }}
          COLLECTIONS_REPO: ${{ github.workspace }}/collections-repo
        run: |
          python tools-repo/update_collections.py ${{ inputs.test && '--test' || '' }} 2>&1 | tee /tmp/update-output.txt
          {
            echo "log<<LOG_EOF"
            cat /tmp/update-output.txt
            echo "LOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Generate PR summary from diff
        id: summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: collections-repo
        run: |
          {
            echo "body<<BODY_EOF"
            git diff | python ${{ github.workspace }}/tools-repo/generate_pr_summary.py ${{ inputs.test && '--test' || '' }}
            echo ""
            echo "<details>"
            echo "<summary>Update Log</summary>"
            echo ""
            echo '```'
            echo "${{ steps.update.outputs.log }}"
            echo '```'
            echo "</details>"
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: Set PR metadata
        id: pr-meta
        run: |
          if [ "${{ inputs.test }}" = "true" ]; then
            echo "branch=test/update-collections" >> $GITHUB_OUTPUT
            echo "title=[TEST] chore: auto-update Postman collections" >> $GITHUB_OUTPUT
          else
            echo "branch=auto/update-collections" >> $GITHUB_OUTPUT
            echo "title=chore: auto-update Postman collections" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: collections-repo
          commit-message: "chore: auto-update Postman collections from latest API specs"
          branch: ${{ steps.pr-meta.outputs.branch }}
          delete-branch: true
          title: ${{ steps.pr-meta.outputs.title }}
          body: ${{ steps.summary.outputs.body }}

      - name: Report result
        run: |
          if [ "${{ steps.create-pr.outputs.pull-request-operation }}" = "none" ] || [ -z "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo "✅ Collections are already up to date. No changes detected."
            echo "## ✅ No Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "Collections are already up to date. No PR was created." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ PR ${{ steps.create-pr.outputs.pull-request-operation }}: ${{ steps.create-pr.outputs.pull-request-url }}"
            echo "## 🔀 PR ${{ steps.create-pr.outputs.pull-request-operation }}" >> $GITHUB_STEP_SUMMARY
            echo "**PR:** ${{ steps.create-pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
            echo "**Number:** #${{ steps.create-pr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
          fi
